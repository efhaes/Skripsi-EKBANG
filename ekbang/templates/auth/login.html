{%load static%}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
     <link rel="icon" type="image/x-icon"
      href="{% static 'img/favicon.ico' %}">


    <title>Login | EK-BANG Rumpin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* ===== PAGE ===== */
        .page {
            position: relative;
            min-height: 100vh;
            background: #020617;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== ORB ===== */
        .orb {
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            z-index: 0;
        }

        .orb.one {
            top: -120px;
            left: -120px;
            background: rgb(114, 136, 232);
        }

        .orb.two {
            top: 20%;
            right: -160px;
            background: rgb(207, 34, 238);
        }

        .orb.three {
            bottom: -180px;
            left: 30%;
            background: rgb(223, 45, 45);
        }

        .page > *:not(.orb) {
            position: relative;
            z-index: 1;
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            padding: 32px;
            color: #fff;
        }
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 14px;
        }

        .logo-wrap img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }


        .login-title {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #cbd5f5;
            margin-bottom: 28px;
        }

        .form-label {
            font-size: 0.85rem;
            color: #cbd5f5;
        }

        .form-control {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 12px;
            padding: 10px 14px;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.16);
            border-color: #7c9cff;
            box-shadow: 0 0 0 0.15rem rgba(124,156,255,.35);
            color: #fff;
        }

        .btn-login {
            background: linear-gradient(135deg, #4f46e5, #22d3ee);
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-weight: 600;
            color: #020617;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34,211,238,0.45);
        }
        /* ===== FLASH MESSAGE ===== */
#flash-messages {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 9999;
}

.flash-message {
    margin-bottom: 12px;
    padding: 14px 18px;
    border-radius: 14px;
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.12),
        0 10px 30px rgba(0,0,0,0.4);

    animation: slideFadeIn 0.4s ease;
}

/* WARNA BERDASARKAN TAG */
.alert-success {
    border-left: 4px solid #22c55e;
}

.alert-error,
.alert-danger {
    border-left: 4px solid #ef4444;
}

.alert-warning {
    border-left: 4px solid #facc15;
}

/* ANIMASI MASUK */
@keyframes slideFadeIn {
    from {
        opacity: 0;
        transform: translateY(-12px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ANIMASI KELUAR */
.flash-message.hide {
    animation: fadeOut 0.6s ease forwards;
}

        .footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 18px;
        }
    </style>
</head>
<body>

<div class="page">
    <!-- ORB BACKGROUND -->
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
        <div id="flash-messages">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} flash-message">
                           {{ message }}
                    </div>
                {% endfor %}
           {% endif %}
        </div>
    <!-- LOGIN CARD -->
    <div class="login-card">
        <div class="logo-wrap">
    <img src="{% static 'img/logo.png' %}" alt="Logo Kecamatan Rumpin">
</div>
        <h4 class="login-title">EKBANG KECAMATAN RUMPIN</h4>
        <div class="login-subtitle">
            Sistem Ekonomi & Pembangunan <br>
            Bantuan Langsung Tunai (BLT)
        </div>
        

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Masukkan username">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan password">
            </div>

            <button class="btn btn-login w-100 mt-2">
                Login Sistem
            </button>
        </form>

        <div class="footer-text">
           © {% now "Y" %} Sistem EKBANG Kecamatan Rumpin
        </div>
    </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const messages = document.querySelectorAll(".flash-message");

    messages.forEach(msg => {
        setTimeout(() => {
            msg.classList.add("hide");

            setTimeout(() => {
                msg.remove();
            }, 600);
        }, 3000);
    });
});
</script>
</body>
</html>
