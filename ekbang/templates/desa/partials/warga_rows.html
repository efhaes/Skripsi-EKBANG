{% for w in warga %}
<tr>
    <td data-label="No">{{ forloop.counter }}</td>
    <td data-label="NIK">{{ w.nik }}</td>
    <td data-label="Nama"><strong>{{ w.nama }}</strong></td>
    <td data-label="Alamat">{{ w.alamat|default:"-" }}</td>
    <td data-label="Aksi" class="action">
        <a href="{% url 'desa_warga_edit' w.id %}" class="btn-icon edit">✏️</a>
        <a href="javascript:void(0)" 
   class="btn-icon delete" 
   onclick="openDeleteModal('{{ w.nama }}', '{% url 'desa_warga_hapus' w.id %}')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" style="text-align:center; color:#ccc; padding: 20px;">Data tidak ditemukan</td>
</tr>
{% endfor %}
